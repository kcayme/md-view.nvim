<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
{{CORE_SCRIPTS}}
{{MERMAID_TAGS}}
{{KATEX}}
{{GRAPHVIZ}}
{{WAVEDROM}}
{{NOMNOML}}
{{ABCJS}}
{{VEGALITE}}
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --md-mono: Menlo, Monaco, Consolas, "Droid Sans Mono", "Courier New", monospace, "Droid Sans Fallback";
    --toc-width: 14rem;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe WPC", "Segoe UI", system-ui, Ubuntu, "Droid Sans", sans-serif;
    font-size: 0.875rem;
    line-height: 1.6;
    color: var(--md-fg);
    background: var(--md-bg);
    word-wrap: break-word;
    min-height: 100vh;
  }

  /* TOC floating panel */
  #md-toc {
    display: none;
    width: var(--toc-width);
    min-width: 10rem;
    flex-direction: column;
    background: var(--md-code-bg, #161b22);
    border: 1px solid var(--md-border, #30363d);
    border-radius: 0.5rem;
    height: calc(100vh - 2rem);
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 150;
    overflow: hidden;
    resize: horizontal;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  body[data-toc-enable="true"] #md-toc { display: flex; }
  body[data-toc-enable="true"][data-toc-position="right"] #md-toc {
    left: auto;
    right: 1rem;
  }
  .toc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.625rem 0.75rem;
    border-bottom: 1px solid var(--md-border, #30363d);
    flex-shrink: 0;
  }
  .toc-title {
    font-size: 0.6875rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--md-link, #58a6ff);
    text-transform: uppercase;
  }
  .toc-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--md-muted, #8b949e);
    padding: 0;
    line-height: 0;
    display: flex;
    align-items: center;
  }
  .toc-close:hover { color: var(--md-fg, #e6edf3); }
  .toc-body {
    flex: 1;
    overflow-y: auto;
    padding: 0.375rem 0;
    scrollbar-width: thin;
    scrollbar-color: var(--md-border, #30363d) transparent;
  }
  .toc-item {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.1875rem 0.625rem;
  }
  .toc-item.toc-active { border-left: 2px solid var(--md-link, #58a6ff); }
  .toc-item:not(.toc-active) { border-left: 2px solid transparent; }
  .toc-toggle {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--md-muted, #8b949e);
    padding: 0;
    line-height: 0;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .toc-toggle:hover { color: var(--md-fg, #e6edf3); }
  .toc-label {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--md-muted, #8b949e);
    font-size: 0.8125rem;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    padding: 0;
  }
  .toc-label:hover { color: var(--md-fg, #e6edf3); }
  .toc-active .toc-label { color: var(--md-fg, #e6edf3); font-weight: 600; }

  /* Content wrap */
  #md-content-wrap {
    flex: 1;
    min-width: 0;
    max-width: 882px;
    margin: 0 auto;
    padding: 0 1.625rem;
  }

  /* FAB to reopen TOC */
  #toc-fab {
    display: none;
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 200;
    background: var(--md-code-bg, #161b22);
    border: 1px solid var(--md-border, #30363d);
    border-radius: 0.375rem;
    padding: 0.375rem;
    cursor: pointer;
    color: var(--md-link, #58a6ff);
    line-height: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  #toc-fab:hover { color: var(--md-fg, #e6edf3); }
  body[data-toc-enable="true"][data-toc-position="right"] #toc-fab { left: auto; right: 1rem; }
  {{PROSE_CSS}}
  {{PALETTE_CSS}}
  {{CSS}}
</style>
<style id="md-view-theme">{{THEME_CSS}}</style>
</head>
<body data-toc-enable="{{TOC_ENABLE}}" data-toc-position="{{TOC_POSITION}}" data-toc-max-depth="{{TOC_MAX_DEPTH}}">
<div id="md-toc">
  <div class="toc-header">
    <span class="toc-title">CONTENTS</span>
    <button class="toc-close" id="toc-close" title="Hide table of contents"></button>
  </div>
  <div class="toc-body"></div>
</div>
<div id="md-content-wrap">
  <div id="content"></div>
</div>
<button id="toc-fab" title="Show table of contents"></button>
<script>
(function() {
  if (typeof mermaid !== 'undefined') {
    mermaid.initialize({ startOnLoad: false, theme: "{{MERMAID_THEME}}", securityLevel: "{{MERMAID_SECURITY_LEVEL}}" });
  }

  {{RENDER_JS}}

  var errorUI = makeErrorUI();
  var container = document.getElementById("content");
  var renderMarkdown = makeRenderer(container, null, errorUI.notifyError, errorUI.clearErrors);

  var ICON_PANEL_LEFT = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>';
  var ICON_PANEL_RIGHT = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M15 3v18"/></svg>';
  var ICON_X_TOC = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>';

  var tocEnabled = document.body.getAttribute("data-toc-enable") === "true";
  var tocPosition = document.body.getAttribute("data-toc-position") || "left";
  var tocMaxDepth = parseInt(document.body.getAttribute("data-toc-max-depth"), 10) || 6;

  var tocEl = document.getElementById("md-toc");
  var tocFab = document.getElementById("toc-fab");
  var tocClose = document.getElementById("toc-close");
  var toc = null;

  if (tocEnabled && tocEl) {
    tocClose.innerHTML = ICON_X_TOC;
    tocFab.innerHTML = tocPosition === "right" ? ICON_PANEL_RIGHT : ICON_PANEL_LEFT;

    toc = makeToc(tocEl, { maxDepth: tocMaxDepth });

    tocClose.addEventListener("click", function() {
      tocEl.style.display = "none";
      tocFab.style.display = "flex";
    });
    tocFab.addEventListener("click", function() {
      tocEl.style.display = "";
      tocFab.style.display = "none";
    });
  }

  var source = new EventSource("/events");
  source.onerror = function() {
    console.warn("md-view: SSE connection lost, waiting to reconnect\u2026");
  };

  var channel = new BroadcastChannel("mdview_" + location.port);
  channel.onmessage = function(e) {
    if (e.data === "takeover") {
      source.close();
      channel.close();
      window.close();
      document.body.innerHTML = '<p style="text-align:center;margin-top:40vh;color:#888;">Preview moved to new tab</p>';
    }
  };
  channel.postMessage("takeover");

  source.addEventListener("content", function(e) {
    var d = safeParse(e.data);
    if (!d) return;
    renderMarkdown(d.content);
    if (toc) toc.update(container);
  });

  source.addEventListener("theme", function(e) {
    var d = safeParse(e.data);
    if (!d) return;
    var style = document.getElementById("md-view-theme");
    if (style) style.remove();
    style = document.createElement("style");
    style.id = "md-view-theme";
    style.textContent = d.css;
    document.head.appendChild(style);
  });

  source.addEventListener("palette", function(e) {
    var d = safeParse(e.data);
    if (!d) return;
    var style = document.getElementById("md-view-palette");
    if (style) style.remove();
    style = document.createElement("style");
    style.id = "md-view-palette";
    style.textContent = d.css;
    document.head.appendChild(style);
  });

  source.addEventListener("close", function() {
    window.close();
    // Fallback if window.close() is blocked by browser
    document.body.innerHTML = '<p style="text-align:center;margin-top:40vh;color:#888;">Preview closed</p>';
  });

  source.addEventListener("scroll", function(e) {
    var d = safeParse(e.data);
    if (d) scrollToSource(container, d);
  });

  source.addEventListener("hljs_theme", function(e) {
    var d = safeParse(e.data);
    if (!d || !d.url) return;
    var el = document.getElementById("md-view-hljs");
    if (!el) {
      el = document.createElement("link");
      el.id = "md-view-hljs";
      el.rel = "stylesheet";
      document.head.appendChild(el);
    }
    el.href = d.url;
  });
})();
</script>
</body>
</html>
