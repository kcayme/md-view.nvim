name: Generate Vimdoc

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  vimdoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Concatenate documentation sources
        run: |
          set -euo pipefail
          test -f README.md
          test -f docs/ARCHITECTURE.md
          test -f docs/recipes/picker-integration.md
          test -f docs/recipes/auto-open.md
          test -f docs/recipes/filetypes.md
          test -f docs/recipes/single-page-mode.md
          test -f docs/options.md

          # Strip the H1 plugin-name line from README — panvimdoc uses the plugin
          # name as the doc title, so keeping it would produce double-prefix tags
          # like *md-view.nvim-md-view.nvim-features*.
          sed '/^# md-view\.nvim$/d' README.md > .doc-source.md
          printf "\n\n" >> .doc-source.md
          # Demote ARCHITECTURE.md and options.md so they nest under the README content.
          sed 's/^#/##/' docs/ARCHITECTURE.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          # Recipe files are NOT demoted — their H1s stay as H1s so that
          # panvimdoc's dedupsubheadings can scope each recipe's H2 subheadings
          # by the recipe's own H1 parent, producing distinct tags like
          # *md-view.nvim-picker-integration-how-it-works* and
          # *md-view.nvim-single-page-mode-how-it-works* even when the heading
          # text is identical.
          cat docs/recipes/picker-integration.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          cat docs/recipes/auto-open.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          cat docs/recipes/filetypes.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          cat docs/recipes/single-page-mode.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          sed 's/^#/##/' docs/recipes/auto-open.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          sed 's/^#/##/' docs/recipes/filetypes.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          sed 's/^#/##/' docs/recipes/single-page-mode.md >> .doc-source.md
          printf "\n\n" >> .doc-source.md
          sed 's/^#/##/' docs/options.md >> .doc-source.md

      - name: Check for duplicate headings
        run: |
          set -euo pipefail
          dupes=$(grep -i '^#' .doc-source.md \
            | tr '[:upper:]' '[:lower:]' \
            | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "ERROR: duplicate headings found (will produce duplicate vimdoc tags):"
            echo "$dupes"
            exit 1
          fi

      - uses: kdheepak/panvimdoc@v4.0.1
        with:
          vimdoc: md-view.nvim
          pandoc: .doc-source.md

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: generate vimdoc [skip ci]"
          file_pattern: doc/md-view.nvim.txt
          branch: main
